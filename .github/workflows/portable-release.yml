name: portable-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: macos-arm64
          - os: macos-13
            artifact: macos-x64
          - os: windows-latest
            artifact: windows-x64
          - os: ubuntu-latest
            artifact: linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system Graphviz on macOS
        if: runner.os == 'macOS'
        run: brew install graphviz

      - name: Install system Graphviz on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install system Graphviz on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install graphviz -y
          echo "C:\Program Files\Graphviz\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build executable with PyInstaller
        run: pyinstaller --clean --noconfirm --name bddstudio bddstudio/cli/main.py

      - name: Assemble portable bundle
        run: python packaging/make_portable_bundle.py --platform ${{ matrix.artifact }}

      - name: Create SHA256 checksums on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd release
          shasum -a 256 BDDStudio-* > SHA256SUMS-${{ matrix.artifact }}.txt

      - name: Create SHA256 checksums on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cd release
          Get-FileHash BDDStudio-* -Algorithm SHA256 | Format-List | Out-File SHA256SUMS-${{ matrix.artifact }}.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BDDStudio-${{ matrix.artifact }}
          path: |
            release/BDDStudio-${{ matrix.artifact }}.zip
            release/BDDStudio-${{ matrix.artifact }}.tar.gz
            release/SHA256SUMS-${{ matrix.artifact }}.txt
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: find artifacts -type f -maxdepth 3 -print

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

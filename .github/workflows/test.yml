name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install BDD Studio
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Doctor
        run: |
          bddstudio doctor

      - name: Check all examples
        run: |
          for f in examples/*.yaml; do
            echo "Checking $f"
            bddstudio check "$f"
          done

      - name: Generate truth tables for all examples
        run: |
          for f in examples/*.yaml; do
            echo "Truth table for $f"
            bddstudio truth "$f"
          done

      - name: Build DOT-only outputs for all examples
        run: |
          for f in examples/*.yaml; do
            echo "Building DOT-only for $f"
            bddstudio build "$f" --no-render
          done

      - name: Build rendered diagrams for one small example
        run: |
          bddstudio build examples/and3.yaml --formats png,svg

project:
  name: "3 Input XNOR"

signals:
  inputs:
    - a
    - b
    - c

  intermediates:
    parity: "a ^ b ^ c"

  outputs:
    y: "~parity"

bdd:
  variable_order:
    - a
    - b
    - c

render:
  output_dir: "build/xnor3"

  formats:
    dot: true
    png: true
    svg: true
    pdf: true
    markdown: true
    html: true
